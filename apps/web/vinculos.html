<!doctype html>
<html lang="pt-BR">
<head>
  <script src="./ui-bootstrap.js?v=20260718-1"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrículas - BlueREC Academia</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme-modern.css" />
  <link rel="stylesheet" href="./product-layout.css" />
  <link rel="stylesheet" href="./membership.css?v=20260719-1" />
</head>
<body class="admin-memberships-page">
  <main class="app-shell">
    <section class="panel">
      <div class="toolbar">
        <div><h2>Lista de matrículas</h2></div>
        <div class="toolbar-actions compact-toolbar-actions">
          <button id="new-link-button" class="icon-button" type="button" aria-label="Nova matrícula" title="Nova matrícula">+</button>
          <button id="link-filter-toggle" class="icon-button" type="button" aria-label="Pesquisar matrículas" title="Pesquisar matrículas" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="10.8" cy="10.8" r="6.8"></circle><path d="m16 16 5 5"></path></svg></button>
        </div>
      </div>
      <div class="membership-filter-panel inline-filter-panel hidden" id="link-filter-panel">
        <div class="membership-filter-grid">
          <div class="field"><label for="link-search">Aluno</label><input id="link-search" placeholder="Nome do aluno" /></div>
          <div class="field"><label for="link-filter-plan">Plano</label><select id="link-filter-plan"><option value="">Todos os planos</option></select></div>
          <div class="field"><label for="link-filter-status">Situação</label><select id="link-filter-status"><option value="">Todas</option><option value="active">Ativa</option><option value="expired">Vencida</option><option value="cancelled">Cancelada</option></select></div>
          <div class="field"><label for="link-filter-from">Início a partir de</label><input id="link-filter-from" type="date" /></div>
          <div class="field"><label for="link-filter-to">Vencimento até</label><input id="link-filter-to" type="date" /></div>
        </div>
      </div>
      <p class="status-line" id="link-status"></p>
      <div class="table-wrap"><table class="membership-table"><thead><tr><th>Aluno</th><th>Plano</th><th>Valor</th><th>Situação</th><th>Contratação</th><th>Vencimento</th><th>Ações</th></tr></thead><tbody id="link-list"></tbody></table></div>
      <div class="entity-pagination" id="link-pagination" aria-label="Paginação de matrículas"></div>
    </section>
  </main>

  <div class="modal hidden" id="link-modal" role="dialog" aria-modal="true" aria-labelledby="link-modal-title">
    <form class="modal-card membership-modal-card" id="link-form">
      <div class="modal-header">
        <div>
          <h3 id="link-modal-title">Dados da matrícula</h3>
        </div>
        <button class="secondary modal-close" type="button" id="close-link-modal" aria-label="Fechar" title="Fechar">×</button>
      </div>

      <section class="form-section membership-form-section">
        <div class="membership-form-fields">
          <div class="field">
            <label for="link-member">Aluno *</label>
            <select id="link-member" required></select>
            <small>Somente alunos ativos aparecem nesta lista.</small>
          </div>
          <div class="field">
            <label for="link-plan">Plano *</label>
            <select id="link-plan" required></select>
            <small>O prazo final será calculado pela duração do plano.</small>
          </div>
          <div class="field">
            <label for="link-start">Data de início</label>
            <input id="link-start" type="date" />
            <small>Se ficar em branco, a matrícula começa hoje.</small>
          </div>
        </div>
      </section>

      <div class="form-actions membership-form-actions">
        <button class="secondary" type="button" id="cancel-link-button">Cancelar</button>
        <button id="save-link-button" type="submit">Salvar</button>
      </div>
    </form>
  </div>

  <script src="./guard.js"></script>
<script src="./nav.js?v=20260719-1"></script>
<script src="./icon-utils.js"></script>
<script src="./vinculos.js?v=20260719-1"></script>
</body>
</html>
