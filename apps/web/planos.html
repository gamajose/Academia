<!doctype html>
<html lang="pt-BR">
<head>
  <script src="./ui-bootstrap.js?v=20260718-1"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planos - BlueREC Academia</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme-modern.css" />
  <link rel="stylesheet" href="./product-layout.css?v=20260716-3" />
</head>
<body>
  <main class="app-shell">
    <section class="panel">
      <div class="toolbar">
        <div><h2>Planos cadastrados</h2></div>
        <button id="new-plan-button" class="icon-button" type="button" aria-label="Cadastrar plano" title="Cadastrar plano">+</button>
      </div>
      <p class="status-line" id="plans-status">Carregando...</p>
      <ul id="plans-page-list"></ul>
      <div class="entity-pagination" id="plans-pagination" aria-label="Paginação dos planos"></div>
    </section>
  </main>

  <div class="modal hidden" id="plan-modal" role="dialog" aria-modal="true" aria-label="Cadastro de plano">
    <form class="modal-card" id="plan-form">
      <div class="modal-header">
        <button class="secondary modal-close" type="button" id="close-plan-modal" aria-label="Fechar" title="Fechar">×</button>
      </div>
      <input id="plan-id" type="hidden" />

      <section class="form-section">
        <h4>Informações principais</h4>
        <div class="form-grid">
          <div class="field"><label for="plan-name-page">Nome do plano *</label><input id="plan-name-page" required placeholder="Ex.: Performance" /></div>
          <div class="field"><label for="plan-price-page">Preço mensal *</label><input id="plan-price-page" inputmode="decimal" placeholder="R$ 129,90" required /></div>
          <div class="field"><label for="plan-duration-value">Duração do plano *</label><input id="plan-duration-value" type="number" min="1" value="1" required /></div>
          <div class="field"><label for="plan-duration-unit">Unidade da duração</label><select id="plan-duration-unit"><option value="months">Mês(es)</option><option value="days">Dia(s)</option></select></div>
        </div>
      </section>

      <section class="form-section">
        <h4>Apresentação do plano</h4>
        <p class="section-help">Use a barra para aplicar negrito, itálico, listas, links, cor e imagens.</p>

        <div class="rich-field">
          <label>Descrição</label>
          <textarea id="plan-description-page" class="rich-editor" data-placeholder="Apresente o plano de forma clara e objetiva."></textarea>
        </div>
        <div class="rich-field">
          <label>Benefícios incluídos</label>
          <textarea id="plan-benefits-page" class="rich-editor" data-placeholder="Crie uma lista com os benefícios do plano."></textarea>
        </div>
        <div class="rich-field">
          <label>Regras e observações</label>
          <textarea id="plan-rules-page" class="rich-editor" data-placeholder="Informe horários, limites ou condições importantes."></textarea>
        </div>
      </section>

      <div class="form-actions plan-modal-actions">
        <button class="secondary" type="button" id="cancel-plan-button">Cancelar</button>
        <button type="submit" id="save-plan-page-button">Salvar</button>
      </div>
    </form>
  </div>

  <script src="./guard.js"></script>
  <script src="./nav.js?v=20260719-1"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script src="./rich-editor.js"></script>
<script src="./icon-utils.js"></script>
<script src="./planos.js"></script>
</body>
</html>
