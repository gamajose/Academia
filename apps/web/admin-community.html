<!doctype html>
<html lang="pt-BR">
<head>
  <script src="./ui-bootstrap.js?v=20260718-1"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comunidade - BlueREC Academia</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./premium-ui.css" />
  <link rel="stylesheet" href="./blue-theme.css" />
  <link rel="stylesheet" href="./training-media.css" />
  <link rel="stylesheet" href="./student-feed.css?v=20260719-3" />
  <link rel="stylesheet" href="./admin-community.css?v=20260719-2" />
</head>
<body class="student-feed-page admin-community-page">
  <main class="app-shell">
    <div class="admin-community-layout">
      <section class="social-main">
        <section class="panel social-composer-entry" id="admin-social-composer">
          <div class="social-composer-entry-row">
            <span class="social-avatar" data-admin-community-avatar>A</span>
            <button class="social-composer-trigger" id="admin-social-composer-trigger" type="button">O que você está pensando, <span data-admin-community-name>José</span>?</button>
          </div>
          <div class="social-composer-entry-actions" aria-label="Ações de publicação">
            <button class="social-entry-action is-photo" id="admin-social-entry-photo" type="button"><span class="social-action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8" cy="9" r="1.5"/><path d="m4 17 5-5 3 3 2-2 6 6"/></svg></span><span>Foto</span></button>
            <button class="social-entry-action is-video" id="admin-social-entry-video" type="button"><span class="social-action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="13" height="14" rx="2"/><path d="m16 10 5-3v10l-5-3z"/></svg></span><span>Vídeo</span></button>
            <button class="social-entry-action is-link" id="admin-social-entry-link" type="button"><span class="social-action-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 7.9 20l1.1-1.1"/></svg></span><span>Link</span></button>
          </div>
        </section>

        <div class="social-feed-heading"><h2>Feed da academia</h2></div>
        <section class="social-feed-list" id="admin-community-feed" aria-live="polite"><div class="empty-state">Carregando publicações...</div></section>
        <p class="status-line" id="admin-community-page-status" aria-live="polite"></p>
      </section>
    </div>
  </main>

  <div class="modal hidden" id="admin-social-composer-modal" role="dialog" aria-modal="true" aria-labelledby="admin-social-composer-title">
    <article class="modal-card social-composer-modal-card">
      <div class="modal-header social-composer-modal-header"><h3 id="admin-social-composer-title">Criar publicação</h3><button class="modal-close" id="admin-social-composer-close" type="button" aria-label="Fechar">×</button></div>
      <div class="social-composer-identity"><span class="social-avatar" data-admin-community-avatar>A</span><div><strong data-admin-community-name>José</strong><small><span class="social-privacy-dot">●</span> Comunidade BlueREC · Publicação oficial</small></div></div>
      <form id="admin-community-form">
        <label class="sr-only" for="admin-community-caption">Texto da publicação</label>
        <textarea class="social-composer-textarea" id="admin-community-caption" maxlength="2000" placeholder="No que você está pensando?"></textarea>
        <div class="social-composer-add"><strong>Adicionar à publicação</strong><div class="social-composer-tools">
          <button class="social-tool-button is-photo" id="admin-social-modal-photo" type="button" aria-label="Adicionar foto" title="Adicionar foto"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8" cy="9" r="1.5"/><path d="m4 17 5-5 3 3 2-2 6 6"/></svg></button>
          <button class="social-tool-button is-video" id="admin-social-modal-video" type="button" aria-label="Adicionar vídeo" title="Adicionar vídeo"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="13" height="14" rx="2"/><path d="m16 10 5-3v10l-5-3z"/></svg></button>
          <button class="social-tool-button is-link" id="admin-social-modal-link" type="button" aria-label="Adicionar link" title="Adicionar link"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 7.9 20l1.1-1.1"/></svg></button>
        </div></div>
        <div class="social-hidden-fields"><input id="admin-community-photo-file" type="file" accept="image/jpeg,image/png,image/gif,image/webp" /><input id="admin-community-video-file" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime" /></div>
        <div class="social-link-field hidden" id="admin-community-link-field"><label for="admin-community-media-url">Link da imagem, YouTube, Instagram ou outro conteúdo</label><input id="admin-community-media-url" type="url" maxlength="1000" placeholder="https://..." /></div>
        <div class="social-upload-preview hidden" id="admin-community-upload-preview"><img id="admin-community-preview-image" alt="Prévia da publicação" /><video id="admin-community-preview-video" controls muted playsinline></video><span id="admin-community-preview-empty">Prévia</span></div>
        <p class="status-line" id="admin-community-status" aria-live="polite"></p>
        <div class="social-composer-footer"><button class="button secondary" id="admin-social-composer-cancel" type="button">Cancelar</button><button class="button" id="admin-community-submit" type="submit">Publicar</button></div>
      </form>
    </article>
  </div>
  <script src="./guard.js"></script>
  <script src="./training-media.js"></script>
  <script src="./nav.js?v=20260719-1"></script>
  <script src="./community-media.js?v=20260716-2"></script>
  <script src="./admin-community.js?v=20260719-2"></script>
</body>
</html>
