<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Nova senha - BlueREC Academia</title><link rel="stylesheet" href="./landing.css" /></head>
<body>
  <main class="site-shell"><header class="site-header"><a class="brand" href="./index.html"><span>Academia</span> Lobo</a><nav class="site-nav"><a href="./index.html">Início</a><a href="./student-login.html">Acessar conta</a></nav></header>
    <section class="login-layout reset-layout"><div class="login-visual"><div><p class="eyebrow-light">Acesso seguro</p><h1>Crie uma nova senha e volte para sua rotina.</h1><p>O link de recuperação é válido por 30 minutos.</p></div></div>
      <form class="login-card-premium" id="reset-form" novalidate><p class="eyebrow-public">Nova senha</p><h2>Redefinir acesso</h2><p>Escolha uma senha forte para sua conta.</p><div class="form-field"><label for="reset-password">Nova senha</label><input id="reset-password" type="password" autocomplete="new-password" minlength="10" required /></div><div class="form-field"><label for="reset-password-confirmation">Confirme a senha</label><input id="reset-password-confirmation" type="password" autocomplete="new-password" minlength="10" required /></div><button class="cta login-primary" type="submit">Salvar nova senha</button><p class="login-message" id="reset-message" aria-live="polite"></p></form>
    </section>
  </main><script src="./student-reset.js"></script>
</body>
</html>
