<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alunos - Academia Lobo</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme-modern.css" />
  <link rel="stylesheet" href="./product-layout.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Administração</p>
        <h1>Alunos</h1>
        <p>Lista de alunos com plano, status, inadimplência e cadastro completo.</p>
      </div>
      <div class="health-card"><span>Módulo</span><strong>Alunos</strong><small>cadastro, edição e status</small></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2>Lista de alunos</h2>
        <button id="new-student-button">Cadastrar aluno</button>
      </div>
      <input id="student-search" placeholder="Buscar aluno por nome, e-mail ou telefone" />
      <p class="status-line" id="students-status">Carregando...</p>
      <ul id="students-list"></ul>
    </section>
  </main>

  <div class="modal hidden" id="student-form-panel">
    <div class="modal-card">
      <div class="toolbar">
        <h3>Cadastro do aluno</h3>
        <button class="secondary" id="close-student-modal">Fechar</button>
      </div>
      <input id="student-id" type="hidden" />
      <div class="grid">
        <input id="student-name" placeholder="Nome completo" />
        <input id="student-document" placeholder="CPF/RG" />
        <input id="student-email" placeholder="E-mail" />
        <input id="student-phone" placeholder="Telefone" />
        <input id="student-birth" type="date" />
        <input id="student-emergency" placeholder="Contato de emergência" />
      </div>
      <textarea id="student-address" placeholder="Endereço"></textarea>
      <textarea id="student-objective" placeholder="Objetivo do aluno"></textarea>
      <textarea id="student-allergies" placeholder="Alergias e restrições"></textarea>
      <textarea id="student-medical" placeholder="Ficha médica / observações clínicas"></textarea>
      <textarea id="student-nutrition" placeholder="Ficha nutricionista / observações alimentares"></textarea>
      <textarea id="student-notes" placeholder="Observações internas"></textarea>
      <button id="save-student-button">Salvar aluno</button>
    </div>
  </div>

  <script src="./guard.js"></script>
  <script src="./nav.js"></script>
  <script src="./alunos.js"></script>
</body>
</html>
