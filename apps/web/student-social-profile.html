<!doctype html>
<html lang="pt-BR">
<head>
  <script src="./ui-bootstrap.js?v=20260718-1"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil - BlueREC Academia</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./premium-ui.css" />
  <link rel="stylesheet" href="./blue-theme.css" />
  <link rel="stylesheet" href="./student-shell.css?v=20260719-1" />
  <link rel="stylesheet" href="./student-feed.css" />
  <link rel="stylesheet" href="./student-social-profile.css?v=20260719-2" />
</head>
<body class="student-page social-profile-page" data-student-page="profile">
  <nav class="top-nav student-top-nav">
    <a class="top-nav-brand" href="./student-portal.html" aria-label="BlueREC Academia, área do aluno"><img class="top-nav-logo" src="./blue-rec-logo.png" alt="BlueREC Academia" width="36" height="36" /></a>
    <div class="top-nav-links student-module-nav" aria-label="Navegação do aluno">
      <a data-student-link="training" href="./student-portal.html">Meu treino</a>
      <a data-student-link="progress" href="./student-progress.html">Minha evolução</a>
      <a data-student-link="goals" href="./student-goals.html">Minhas metas</a>
      <a data-student-link="share" href="./student-share.html">Compartilhar foto</a>
      <a data-student-link="history" href="./student-history.html">Histórico</a>
    </div>
    <div class="profile-menu"><button class="profile-trigger" id="student-profile-trigger" type="button" aria-expanded="false"><span class="profile-avatar" data-student-avatar>A</span><span class="profile-copy"><strong data-student-name>Aluno</strong><span>Minha conta</span></span></button><div class="profile-dropdown hidden" id="student-profile-dropdown"><a href="./student-social-profile.html">Meu perfil</a><a href="./student-security.html">Segurança</a><button class="logout-item" id="student-profile-logout" type="button">Sair</button></div></div>
  </nav>

  <main class="app-shell">
    <section class="social-profile-page-hero">
      <div class="social-profile-page-header panel">
        <div class="social-avatar" id="social-profile-page-avatar">A</div>
        <div class="social-profile-page-identity"><div class="social-profile-page-identity-row"><h1 id="social-profile-page-name">Aluno</h1><button class="button secondary social-profile-edit-button" id="social-profile-edit-open" type="button">Editar</button></div><small id="social-profile-page-visibility">Perfil público</small></div>
        <p class="social-profile-page-bio" id="social-profile-page-bio"></p>
        <a class="social-profile-page-link" id="social-profile-page-link" href="#" target="_blank" rel="noopener noreferrer" hidden></a>
        <div class="social-profile-page-stats"><span><strong id="social-profile-page-followers">0</strong><small>seguidores</small></span><span><strong id="social-profile-page-following">0</strong><small>seguindo</small></span></div>
        <section class="social-profile-start-summary" id="social-profile-start-summary" hidden>
          <div class="social-profile-start-heading"><strong>Você começou com</strong><small id="social-profile-start-date"></small></div>
          <div class="social-profile-start-grid" id="social-profile-start-grid"></div>
        </section>
      </div>
    </section>

    <p class="status-line" id="social-profile-page-status" aria-live="polite"></p>
  </main>

  <div class="modal hidden" id="social-profile-editor-modal" role="dialog" aria-modal="true" aria-labelledby="social-profile-editor-title">
    <article class="modal-card social-profile-editor-modal-card">
      <div class="modal-header"><h3 id="social-profile-editor-title">Editar perfil</h3><button class="modal-close" id="social-profile-editor-close" type="button" aria-label="Fechar">×</button></div>
      <form class="social-profile-editor-form" id="social-profile-editor-form">
        <div class="social-profile-editor-photo"><div class="social-avatar" id="social-profile-editor-avatar" role="button" tabindex="0" aria-label="Alterar foto do perfil" title="Alterar foto do perfil">A</div><input id="social-profile-editor-photo" type="file" accept="image/jpeg,image/png,image/webp" hidden /></div>
        <div class="field"><label for="social-profile-editor-name">Nome</label><input id="social-profile-editor-name" maxlength="160" required /></div>
        <div class="field"><label for="social-profile-editor-bio">Bio</label><textarea id="social-profile-editor-bio" maxlength="500" placeholder="Conte um pouco sobre sua jornada."></textarea></div>
        <div class="field"><label for="social-profile-editor-link">Link</label><input id="social-profile-editor-link" type="url" maxlength="500" placeholder="https://instagram.com/seu-perfil" /></div>
        <label class="social-check"><input id="social-profile-editor-private" type="checkbox" /><span>Deixar meu perfil privado</span></label>
        <p class="status-line" id="social-profile-editor-status" aria-live="polite"></p>
        <div class="form-actions"><button class="secondary" id="social-profile-editor-cancel" type="button">Cancelar</button><button id="social-profile-editor-save" type="submit">Salvar</button></div>
      </form>
    </article>
  </div>

  <script src="./student-shell.js?v=20260719-2"></script>
  <script src="./student-social-profile.js?v=20260719-2"></script>
</body>
</html>
