<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acessar conta - Academia Lobo</title>
  <link rel="stylesheet" href="./landing.css" />
</head>
<body>
  <main class="site-shell">
    <header class="site-header">
      <a class="brand" href="./index.html"><span>Academia</span> Lobo</a>
      <nav class="site-nav">
        <a href="./index.html">Início</a>
        <a href="./plans.html">Planos</a>
      </nav>
    </header>

    <section class="login-layout">
      <div class="login-visual">
        <div>
          <p class="eyebrow-light">Área exclusiva</p>
          <h1>Seu treino e sua evolução em um só lugar.</h1>
          <p>Use seu e-mail e senha. O sistema identifica automaticamente se o acesso é de aluno, professor ou administrador.</p>
        </div>
      </div>

      <section class="login-card-premium" aria-labelledby="login-title">
        <p class="eyebrow-public">Bem-vindo</p>
        <h2 id="login-title">Acessar conta</h2>
        <p>Entre com os dados cadastrados na academia.</p>

        <div class="form-field">
          <label for="student-email">E-mail</label>
          <input id="student-email" type="email" inputmode="email" autocomplete="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-field">
          <label for="student-password">Senha</label>
          <div class="password-row"><input id="student-password" type="password" autocomplete="current-password" placeholder="Digite sua senha" required /><button class="password-toggle" id="password-toggle" type="button" aria-label="Mostrar senha">Mostrar</button></div>
        </div>

        <label class="remember-row"><input id="remember-account" type="checkbox" /> <span>Manter conectado neste dispositivo</span></label>

        <button class="cta login-primary" id="student-login-button" type="button">Entrar</button>
        <div class="login-secondary-actions">
          <a class="cta ghost" href="./matricula-publica.html">Criar conta</a>
          <button class="cta ghost" id="forgot-password-button" type="button">Esqueci a senha</button>
        </div>
        <small class="login-message" id="student-login-message" aria-live="polite"></small>
      </section>
    </section>
  </main>
  <script src="./student-login.js"></script>
</body>
</html>
