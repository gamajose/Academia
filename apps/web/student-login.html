<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acessar conta - Academia Lobo</title>
  <link rel="stylesheet" href="./landing.css" />
</head>
<body>
  <main class="site-shell">
    <header class="site-header">
      <div class="brand"><span>Academia</span> Lobo</div>
      <nav class="site-nav">
        <a href="./index.html">Início</a>
        <a href="./matricula-publica.html">Matricule-se</a>
      </nav>
    </header>

    <section class="site-hero">
      <div>
        <p class="eyebrow-public">Acesso único</p>
        <h1>Entre uma vez. O sistema leva você ao lugar certo.</h1>
        <p>Aluno acessa treino, avaliações e histórico. Equipe acessa o painel administrativo conforme permissões.</p>
      </div>
      <section class="hero-card">
        <h2>Acessar conta</h2>
        <label>E-mail</label>
        <input id="student-email" type="email" placeholder="seu@email.com" />
        <label>Senha</label>
        <input id="student-password" type="password" placeholder="sua senha" />
        <button class="cta" id="student-login-button">Entrar</button>
        <div class="hero-actions">
          <a class="cta ghost" href="./matricula-publica.html">Criar conta</a>
          <button class="cta ghost" id="forgot-password-button" type="button">Esqueci a senha</button>
        </div>
        <small id="student-login-message"></small>
      </section>
    </section>
  </main>
  <script src="./student-login.js"></script>
</body>
</html>
