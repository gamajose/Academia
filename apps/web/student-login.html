<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Área do aluno - Academia Platform</title>
  <link rel="stylesheet" href="./landing.css" />
</head>
<body>
  <main class="site-shell">
    <header class="site-header">
      <div class="brand">Academia Platform</div>
      <nav class="site-nav">
        <a href="./index.html">Início</a>
        <a href="./matricula-publica.html">Matricule-se</a>
      </nav>
    </header>

    <section class="site-hero">
      <div>
        <p>Área de acesso</p>
        <h1>Entre com sua conta.</h1>
        <p>O mesmo acesso direciona cada perfil para o lugar certo: aluno vai para o portal de treino; administração vai para o painel interno.</p>
      </div>
      <section class="hero-card">
        <h2>Acessar conta</h2>
        <label>E-mail</label>
        <input id="student-email" type="email" placeholder="seu@email.com" />
        <label>Senha</label>
        <input id="student-password" type="password" placeholder="sua senha" />
        <button class="cta" id="student-login-button">Entrar</button>
        <div class="hero-actions">
          <a class="cta ghost" href="./matricula-publica.html">Criar conta</a>
          <button class="cta ghost" id="forgot-password-button" type="button">Esqueci a senha</button>
        </div>
        <small id="student-login-message"></small>
      </section>
    </section>
  </main>
  <script src="./student-login.js"></script>
</body>
</html>
