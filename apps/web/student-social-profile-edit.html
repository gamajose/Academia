<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar perfil - BlueREC Academia</title>
  <link rel="stylesheet" href="./styles.css" /><link rel="stylesheet" href="./premium-ui.css" /><link rel="stylesheet" href="./blue-theme.css" /><link rel="stylesheet" href="./student-shell.css" /><link rel="stylesheet" href="./student-feed.css" /><link rel="stylesheet" href="./student-social-profile.css" />
</head>
<body class="student-page social-profile-edit-page" data-student-page="profile">
  <nav class="top-nav student-top-nav"><a class="top-nav-brand" href="./student-portal.html" aria-label="BlueREC Academia, área do aluno"><img class="top-nav-logo" src="./blue-rec-logo.png" alt="BlueREC Academia" width="36" height="36" /></a><div class="top-nav-links student-module-nav"><a data-student-link="training" href="./student-portal.html">Meu treino</a><a data-student-link="progress" href="./student-progress.html">Minha evolução</a><a data-student-link="goals" href="./student-goals.html">Minhas metas</a><a data-student-link="share" href="./student-share.html">Compartilhar foto</a><a data-student-link="history" href="./student-history.html">Histórico</a></div><div class="profile-menu"><button class="profile-trigger" id="student-profile-trigger" type="button" aria-expanded="false"><span class="profile-avatar" data-student-avatar>A</span><span class="profile-copy"><strong data-student-name>Aluno</strong><span>Minha conta</span></span></button><div class="profile-dropdown hidden" id="student-profile-dropdown"><a href="./student-social-profile.html">Meu perfil</a><a href="./student-security.html">Segurança</a><button class="logout-item" id="student-profile-logout" type="button">Sair</button></div></div></nav>
  <main class="app-shell"><section class="hero social-profile-edit-hero"><h1>Editar perfil</h1></section><div class="social-profile-settings-layout"><aside class="panel social-profile-settings-nav"><h2>Conta</h2><a class="is-active" href="./student-social-profile-edit.html">Perfil</a><h2>Preferências</h2><a href="#social-profile-units">Unidades e idioma</a></aside><form class="panel social-profile-edit-form" id="social-profile-form"><div class="social-profile-edit-photo"><div class="social-avatar" id="social-edit-avatar" role="button" tabindex="0" aria-label="Alterar foto do perfil" title="Alterar foto do perfil">A</div><div><small>Foto visível no seu perfil</small><input id="social-profile-photo-file" type="file" accept="image/jpeg,image/png,image/webp" hidden /></div></div><div class="field"><label for="social-profile-name">Nome</label><input id="social-profile-name" maxlength="160" required /></div><div class="field"><label for="social-profile-bio">Bio</label><textarea id="social-profile-bio" maxlength="500" placeholder="Conte um pouco sobre sua jornada."></textarea></div><div class="field"><label for="social-profile-link">Link</label><input id="social-profile-link" type="url" maxlength="500" placeholder="https://instagram.com/seu-perfil" /></div><section class="form-section" id="social-profile-units"><h2>Preferências</h2><div class="form-grid three"><div class="field"><label for="social-profile-weight">Unidade de peso</label><select id="social-profile-weight"><option value="kg">Quilogramas (kg)</option><option value="lb">Libras (lb)</option></select></div><div class="field"><label for="social-profile-distance">Unidade de distância</label><select id="social-profile-distance"><option value="km">Quilômetros (km)</option><option value="mi">Milhas (mi)</option></select></div><div class="field"><label for="social-profile-language">Idioma</label><select id="social-profile-language"><option value="pt-BR">Português</option><option value="en">English</option><option value="es">Español</option></select></div></div><div class="field"><label for="social-profile-theme">Tema</label><select id="social-profile-theme"><option value="light">Claro</option><option value="dark">Escuro</option><option value="system">Automático</option></select></div></section><div class="social-profile-privacy-field"><label class="social-check"><input id="social-profile-private" type="checkbox" /> <span>Deixar meu perfil privado</span></label><small>Em um perfil privado, somente seguidores aprovados veem suas publicações.</small></div><p class="status-line" id="social-profile-status" aria-live="polite"></p><div class="form-actions"><a class="button secondary" href="./student-social-profile.html">Cancelar</a><button class="button" type="submit">Salvar alterações</button></div></form></div></main>
  <script src="./student-shell.js"></script><script src="./student-social-profile-edit.js"></script>
</body>
</html>
