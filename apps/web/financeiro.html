<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Financeiro - Academia Lobo</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme-modern.css" />
  <link rel="stylesheet" href="./product-layout.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div><p class="eyebrow">Administração</p><h1>Financeiro</h1><p>Dashboard de recebimentos, pendências, atrasos e ações vinculadas ao aluno.</p></div>
    </section>
    <section class="cards finance-summary">
      <article><span>Pendente</span><strong id="pending-amount">R$ 0,00</strong></article>
      <article><span>Vencido</span><strong id="overdue-amount">R$ 0,00</strong></article>
      <article><span>Recebido</span><strong id="paid-amount">R$ 0,00</strong></article>
      <article><span>Lançamentos em aberto</span><strong id="pending-count">0</strong></article>
      <article><span>Pagos</span><strong id="paid-count">0</strong></article>
    </section>
    <section class="panel">
      <div class="toolbar"><h2>Lançamentos financeiros</h2></div>
      <p class="status-line" id="reports-status">Carregando...</p>
      <div class="table-wrap"><table><thead><tr><th>Aluno</th><th>Valor</th><th>Status</th><th>Vencimento</th><th>Método</th><th>Ações</th></tr></thead><tbody id="financial-list"></tbody></table></div>
    </section>
  </main>
  <div class="modal hidden" id="finance-modal">
    <div class="modal-card">
      <div class="toolbar"><h3 id="finance-title">Ajuste financeiro</h3><button class="secondary modal-close" id="close-finance-modal" aria-label="Fechar" title="Fechar">×</button></div>
      <input id="finance-payment-id" type="hidden" />
      <div class="grid">
        <input id="finance-discount" type="number" placeholder="Desconto em centavos" />
        <input id="finance-fee" type="number" placeholder="Taxa ou juros em centavos" />
        <input id="finance-method" placeholder="Forma de pagamento" />
      </div>
      <textarea id="finance-notes" placeholder="Observações"></textarea>
      <button id="finance-adjust-button">Aplicar ajuste</button>
    </div>
  </div>
  <script src="./guard.js"></script>
  <script src="./nav.js"></script>
  <script src="./fin-core.js"></script>
</body>
</html>
