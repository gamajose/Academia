<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu treino - Academia Platform</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Area do aluno</p>
        <h1>Meu treino de hoje</h1>
        <p>Visualizacao simples para o cliente ver a ficha, instrucoes, videos e marcar o treino como feito.</p>
      </div>
      <div class="health-card">
        <span>Execucao</span>
        <strong id="student-status-card">aguardando</strong>
        <small>treino, video e feedback</small>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <h3>Selecionar aluno</h3>
        <select id="student-member"></select>
        <button id="load-student-workout-button">Carregar treino</button>
        <p class="status-line" id="student-status">Aguardando aluno.</p>
      </article>

      <article class="panel">
        <h3>Feedback do treino</h3>
        <input id="student-effort" type="number" min="1" max="10" placeholder="Esforco percebido de 1 a 10" />
        <textarea id="student-feedback" placeholder="Como foi o treino? Dor, dificuldade ou observacao"></textarea>
        <button id="complete-workout-button">Marcar treino como feito</button>
      </article>
    </section>

    <section class="panel">
      <h3 id="student-plan-title">Ficha</h3>
      <p id="student-plan-meta"></p>
      <ul id="student-exercise-list"></ul>
    </section>

    <section class="panel">
      <h3>Historico recente</h3>
      <ul id="student-log-list"></ul>
    </section>
  </main>

  <script src="./nav.js"></script>
  <script src="./student.js"></script>
</body>
</html>
