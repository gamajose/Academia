<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pré-matrículas - BlueREC Academia</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme-modern.css" />
  <link rel="stylesheet" href="./product-layout.css" />
  <link rel="stylesheet" href="./pre-enrollments.css" />
</head>
<body>
  <main class="app-shell">
    <section class="panel pre-enrollment-panel" id="received-signups-panel">
      <div class="toolbar">
        <div class="pre-enrollment-heading">
          <h2>Solicitações recebidas</h2>
          <span class="signup-count" id="signup-count">0</span>
        </div>
        <button class="icon-button" id="signup-search-toggle" type="button" aria-label="Pesquisar solicitações" title="Pesquisar solicitações"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="10.8" cy="10.8" r="6.8"></circle><path d="m16 16 5 5"></path></svg></button>
      </div>
      <div class="signup-search-wrap hidden"><input id="signup-search" placeholder="Buscar por nome, plano, status ou código" /></div>
      <p class="status-line" id="signup-status"></p>
      <ul id="signup-list"></ul>
      <div class="signup-pagination" id="signup-pagination"></div>
    </section>

    <section class="panel pre-enrollment-panel pre-enrollment-validation-panel">
      <h3>Validar código apresentado na recepção</h3>
      <input id="check-code" placeholder="Código apresentado pelo aluno" />
        <button id="check-code-button">Validar código</button>
      <p class="status-line" id="check-code-status"></p>
    </section>
  </main>

  <div class="modal hidden" id="qr-modal">
    <div class="modal-card" style="text-align:center; max-width:520px;">
      <div class="toolbar">
        <h3>Cartão de liberação</h3>
        <button class="secondary modal-close" id="close-qr-modal" aria-label="Fechar" title="Fechar">×</button>
      </div>
      <p id="qr-name" class="status-line"></p>
      <img id="qr-image" alt="QR Code da pré-matrícula" style="width:220px;height:220px;margin:16px auto;display:block;background:#fff;padding:12px;border-radius:16px;" />
      <h2 id="qr-code"></h2>
      <p class="status-line">Apresente este código ou QR Code na recepção da academia.</p>
    </div>
  </div>

  <script src="./guard.js"></script>
  <script src="./nav.js"></script>
  <script src="./solicitacoes.js"></script>
</body>
</html>
