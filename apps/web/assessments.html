<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Avaliacoes - Academia Lobo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Evolucao do aluno</p>
        <h1>Avaliacoes fisicas e metas</h1>
        <p>Registre medidas, acompanhe evolucao e defina metas individuais para o aluno.</p>
      </div>
      <div class="health-card">
        <span>Modulo</span>
        <strong>Evolucao</strong>
        <small>medidas, metas e comparativo</small>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <h3>Nova avaliacao</h3>
        <select id="assessment-member"></select>
        <input id="assessment-date" type="date" />
        <input id="weight-kg" type="number" step="0.01" placeholder="Peso kg" />
        <input id="height-cm" type="number" step="0.01" placeholder="Altura cm" />
        <input id="body-fat" type="number" step="0.01" placeholder="Gordura corporal %" />
        <input id="muscle-mass" type="number" step="0.01" placeholder="Massa muscular kg" />
        <input id="waist-cm" type="number" step="0.01" placeholder="Cintura cm" />
        <input id="chest-cm" type="number" step="0.01" placeholder="Peito cm" />
        <input id="hip-cm" type="number" step="0.01" placeholder="Quadril cm" />
        <input id="photo-url" placeholder="URL da foto de evolucao" />
        <textarea id="assessment-notes" placeholder="Observacoes"></textarea>
        <button id="create-assessment-button">Salvar avaliacao</button>
      </article>

      <article class="panel">
        <h3>Nova meta</h3>
        <select id="goal-member"></select>
        <input id="goal-type" placeholder="Tipo da meta. Ex: perder peso" />
        <input id="goal-value" type="number" step="0.01" placeholder="Valor alvo" />
        <input id="goal-date" type="date" />
        <textarea id="goal-notes" placeholder="Observacoes da meta"></textarea>
        <button id="create-goal-button">Salvar meta</button>
        <p class="status-line" id="assessment-status">Aguardando.</p>
      </article>
    </section>

    <section class="grid lists-grid">
      <article class="panel">
        <h3>Resumo comparativo</h3>
        <select id="summary-member"></select>
        <button id="load-summary-button">Carregar resumo</button>
        <ul id="summary-list"></ul>
      </article>
      <article class="panel">
        <h3>Metas</h3>
        <ul id="goal-list"></ul>
      </article>
    </section>

    <section class="panel">
      <h3>Historico de avaliacoes</h3>
      <ul id="assessment-list"></ul>
    </section>
  </main>
  <script src="./nav.js"></script>
  <script src="./assessments.js"></script>
</body>
</html>
