<main class="app-shell"><section class="hero"><p class="eyebrow">Acompanhamento</p><h1>Compartilhar foto</h1><p>Envie uma foto de evolução para acompanhar seu progresso com a equipe.</p></section><section class="panel"><div class="field"><label for="portal-progress-photo">Foto do celular ou computador</label><input id="portal-progress-photo" type="file" accept="image/jpeg,image/png,image/gif,image/webp" /><small>JPG, PNG, GIF ou WebP. Limite de 5 MB.</small></div><div class="field"><label for="portal-progress-photo-url">Ou cole um link</label><input id="portal-progress-photo-url" type="url" placeholder="https://.../foto.jpg" /></div><div class="field"><label for="portal-progress-photo-notes">Observação</label><input id="portal-progress-photo-notes" maxlength="500" placeholder="Ex.: foto frontal, mês 2" /></div><div class="student-progress-upload-preview"><img id="portal-progress-photo-preview" alt="Prévia da foto de evolução" hidden /><span id="portal-progress-photo-empty">A prévia aparecerá aqui.</span></div><div class="form-actions"><button id="portal-progress-photo-button" type="button">Compartilhar foto</button></div><p class="status-line" id="portal-progress-photo-status" aria-live="polite"></p></section></main><script src="./student-shell.js?v=20260719-2"></script><script src="./student-share.js"></script></body></html>
