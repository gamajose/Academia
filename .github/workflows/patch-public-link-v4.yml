name: Integrar pagina publica de planos

on:
  push:
    branches:
      - agent/finance-public-desktop-v4
    paths:
      - '.github/workflows/patch-public-link-v4.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finance-public-desktop-v4
          fetch-depth: 0
      - name: Adicionar acesso aos planos
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          index = Path('apps/web/index.html')
          if index.exists():
              text = index.read_text()
              if 'plans.html' not in text:
                  button = '''\n<a href="plans.html" aria-label="Conheça nossos planos" style="position:fixed;right:20px;bottom:20px;z-index:999;background:#dc2626;color:white;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.2)">Conheça os planos</a>\n'''
                  marker = '</body>'
                  if marker not in text:
                      raise SystemExit('index.html sem fechamento body')
                  index.write_text(text.replace(marker, button + marker, 1))
          Path('.github/workflows/patch-public-link-v4.yml').unlink()
          PY
      - name: Salvar integracao
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: link public home to plans page"
          git push origin HEAD:agent/finance-public-desktop-v4
