name: Aplicar proteção do resumo da IA

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/aplicar-resumo-ia-incompleto.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/resumo-ia-incompleto
          fetch-depth: 0

      - name: Corrigir resumos cortados
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          ui = Path('apps/web/training-review-ui.js')
          text = ui.read_text(encoding='utf-8')

          marker = """  function plural(count, singular, pluralText) {
    return Number(count) === 1 ? singular : pluralText;
  }

  function comparisonText(rows) {
"""
          replacement = """  function plural(count, singular, pluralText) {
    return Number(count) === 1 ? singular : pluralText;
  }

  function safeSummary(review) {
    const summary = humanizeText(review?.summary || '');
    const normalized = summary.normalize('NFD').replace(/[\\u0300-\\u036f]/g, '').trim();
    const incompleteEnding = /\\b(rep|reps|serie|series|sessao|sessoes|treino|exercicio|exercicios)$/i.test(normalized);
    if (summary.length >= 20 && /[.!?]$/.test(summary) && !incompleteEnding) return summary;
    if (review?.requires_human_review || review?.status === 'professional_review') {
      return 'A ficha precisa de revisão do professor antes de qualquer progressão.';
    }
    return 'A análise foi concluída. Consulte os pontos de atenção e as sugestões abaixo.';
  }

  function comparisonText(rows) {
"""
          if marker not in text:
              raise SystemExit('marcador_safe_summary_nao_encontrado')
          text = text.replace(marker, replacement, 1)

          old_render = "setText('review-summary', review?.summary || 'A análise foi concluída.');"
          new_render = "setText('review-summary', safeSummary(review));"
          if old_render not in text:
              raise SystemExit('render_summary_nao_encontrado')
          text = text.replace(old_render, new_render, 1)

          old_history = """        item?.summary || '',
        [
"""
          new_history = """        safeSummary(item),
        [
"""
          if old_history not in text:
              raise SystemExit('history_summary_nao_encontrado')
          text = text.replace(old_history, new_history, 1)

          old_export = """    humanizeText,
    comparisonText
  };
"""
          new_export = """    humanizeText,
    safeSummary,
    comparisonText
  };
"""
          if old_export not in text:
              raise SystemExit('export_summary_nao_encontrado')
          text = text.replace(old_export, new_export, 1)
          ui.write_text(text, encoding='utf-8')

          test = Path('apps/api/test/trainingReviewUi.test.js')
          test_text = test.read_text(encoding='utf-8')
          test_text = test_text.replace(
              "  humanizeText,\n  comparisonText",
              "  humanizeText,\n  safeSummary,\n  comparisonText",
              1
          )
          test_text += """

test('substitui resumo cortado por uma mensagem completa', () => {
  assert.equal(
    safeSummary({ summary: 'O plano inclui 3 rep', status: 'professional_review', requires_human_review: true }),
    'A ficha precisa de revisão do professor antes de qualquer progressão.'
  );
});

test('preserva resumo completo da análise', () => {
  const summary = 'A ficha está organizada, mas precisa de acompanhamento do professor.';
  assert.equal(safeSummary({ summary, status: 'adjust' }), summary);
});
"""
          test.write_text(test_text, encoding='utf-8')

          Path('.github/workflows/aplicar-resumo-ia-incompleto.yml').unlink()
          PY

      - name: Registrar alteração
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/training-review-ui.js apps/api/test/trainingReviewUi.test.js .github/workflows/aplicar-resumo-ia-incompleto.yml
          git commit -m 'fix(web): substituir resumo incompleto da IA'
          git push origin HEAD:fix/resumo-ia-incompleto
