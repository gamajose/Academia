name: Aplicar correção do retorno na PR

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/scripts/apply_training_review_return_fix.py'
      - '.github/scripts/fix_training_review_recovery_scope.py'
      - '.github/workflows/aplicar-fix-retorno-pr.yml'

permissions:
  contents: write

jobs:
  aplicar:
    if: github.head_ref == 'fix/retorno-analise-ia-sem-erro'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/retorno-analise-ia-sem-erro
          fetch-depth: 0
      - name: Aplicar correção
        run: |
          python3 .github/scripts/apply_training_review_return_fix.py
          python3 .github/scripts/fix_training_review_recovery_scope.py
      - name: Validar
        run: |
          node --check apps/web/training-review-ui.js
          node --check apps/web/training.js
          node --test apps/api/test/trainingReviewUi.test.js
      - name: Registrar alteração
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/scripts/apply_training_review_return_fix.py
          rm -f .github/scripts/fix_training_review_recovery_scope.py
          rm -f .github/workflows/aplicar-fix-retorno-pr.yml
          rm -f .github/workflows/aplicar-fix-retorno-analise.yml
          git add apps/web/training-review-ui.js apps/web/training.js apps/web/training.html apps/api/test/trainingReviewUi.test.js .github/scripts/apply_training_review_return_fix.py .github/scripts/fix_training_review_recovery_scope.py .github/workflows/aplicar-fix-retorno-pr.yml .github/workflows/aplicar-fix-retorno-analise.yml
          git commit -m 'fix(web): recuperar análise sem exibir falso erro'
          git push origin HEAD:fix/retorno-analise-ia-sem-erro
