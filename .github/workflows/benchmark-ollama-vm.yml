name: Benchmark Ollama na VM

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/benchmark-ollama-vm.yml'
  workflow_dispatch:

concurrency:
  group: benchmark-ollama-vm
  cancel-in-progress: true

jobs:
  benchmark:
    name: Medir narrativa curta no gemma3 1b
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 8
    env:
      API_DIR: /mnt/Projetos/Academia/apps/api
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: gemma3:1b
      OLLAMA_TIMEOUT_MS: 120000
      LOCAL_TRAINING_MAX_RETRIES: 0
      RESULT_FILE: /tmp/ollama-benchmark.json

    steps:
      - name: Preparar modelo
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(systemctl is-active ollama.service)" = "active"
          ollama stop gemma3:4b >/dev/null 2>&1 || true
          ollama stop gemma3:1b >/dev/null 2>&1 || true
          ollama list | awk 'NR > 1 && $1 == "gemma3:1b" {found=1} END {exit found ? 0 : 1}'

      - name: Executar benchmark seguro
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$API_DIR"
          node <<'NODE'
          const fs = require('fs');
          const { requestOllama } = require('./services/localTrainingAiService');

          const model = process.env.OLLAMA_MODEL;
          const results = [];
          const save = () => fs.writeFileSync(process.env.RESULT_FILE, JSON.stringify({ model, results }, null, 2));

          async function measure(name, payload, validate) {
            const started = Date.now();
            try {
              const response = await requestOllama(payload);
              const content = String(response?.message?.content || '');
              if (validate) validate(content);
              const item = {
                name,
                ok: true,
                elapsed_ms: Date.now() - started,
                content_chars: content.length,
                prompt_tokens: Number(response.prompt_eval_count || 0),
                completion_tokens: Number(response.eval_count || 0),
                total_duration_ms: Math.round(Number(response.total_duration || 0) / 1e6),
                load_duration_ms: Math.round(Number(response.load_duration || 0) / 1e6)
              };
              results.push(item);
              save();
              console.log(JSON.stringify(item));
            } catch (error) {
              const item = {
                name,
                ok: false,
                elapsed_ms: Date.now() - started,
                error_code: String(error.code || error.message || 'unknown').slice(0, 120)
              };
              results.push(item);
              save();
              console.log(JSON.stringify(item));
            }
          }

          (async () => {
            const narrativeSchema = {
              type: 'object',
              additionalProperties: false,
              required: ['summary', 'student_message', 'trainer_notes'],
              properties: {
                summary: { type: 'string', minLength: 1, maxLength: 180 },
                student_message: { type: 'string', minLength: 1, maxLength: 180 },
                trainer_notes: { type: 'string', minLength: 1, maxLength: 300 }
              }
            };

            await measure('training_narrative_schema', {
              model,
              stream: false,
              keep_alive: 0,
              format: narrativeSchema,
              options: { temperature: 0, num_ctx: 1024, num_predict: 96 },
              messages: [
                {
                  role: 'system',
                  content: 'Você apoia um profissional de educação física. Responda somente no JSON solicitado, com três textos muito curtos. Não diagnostique, não prescreva e não altere o treino.'
                },
                {
                  role: 'user',
                  content: JSON.stringify({
                    objective: 'condicionamento geral',
                    level: 'iniciante',
                    plan_age_days: 10,
                    sessions: 0,
                    rules_summary: 'Há poucos dados e a ficha exige revisão profissional.',
                    rules_status: 'professional_review',
                    rules_requires_human_review: true,
                    instruction: 'Apenas explique os sinais objetivos já calculados. Seja conservador.'
                  })
                }
              ]
            }, (content) => {
              const value = JSON.parse(content);
              const keys = ['summary', 'student_message', 'trainer_notes'];
              if (!keys.every((key) => typeof value[key] === 'string' && value[key].trim())) throw new Error('narrative_schema_invalid');
            });

            if (!results.every((item) => item.ok)) process.exitCode = 1;
          })();
          NODE

      - name: Registrar estado final
        if: always()
        shell: bash
        run: |
          echo "memory=$(free -h | awk '/^Mem:/ {print $2 "/" $3 "/" $7}')"
          echo "swap=$(free -h | awk '/^Swap:/ {print $2 "/" $3}')"
          ollama ps || true

      - name: Publicar benchmark
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-ollama-${{ github.run_id }}
          path: /tmp/ollama-benchmark.json
          if-no-files-found: warn
          retention-days: 3
