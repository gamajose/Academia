name: Ajustar busca operacional

on:
  push:
    branches:
      - agent/finance-public-desktop-v4
    paths:
      - '.github/workflows/patch-finance-query.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finance-public-desktop-v4
          fetch-depth: 0
      - name: Remover dependencia opcional
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/api/features/financeSalesRoutes.js')
          text = path.read_text()
          old = "AND (unaccent(lower(m.name)) LIKE unaccent(lower($2)) OR lower(COALESCE(m.email,'')) LIKE lower($2) OR COALESCE(m.phone,'') LIKE $3)"
          new = "AND (lower(m.name) LIKE lower($2) OR lower(COALESCE(m.email,'')) LIKE lower($2) OR COALESCE(m.phone,'') LIKE $3)"
          if old not in text:
              raise SystemExit('Trecho de busca nao encontrado')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/patch-finance-query.yml').unlink()
          PY
      - name: Salvar ajuste
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: remove optional unaccent dependency"
          git push origin HEAD:agent/finance-public-desktop-v4
