name: Deploy Academia

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: academia-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    name: Atualizar servidor local
    runs-on:
      - self-hosted
      - linux
      - academia
    timeout-minutes: 15

    steps:
      - name: Atualizar, validar e publicar
        shell: bash
        run: |
          set -Eeuo pipefail

          PROJECT_DIR="/mnt/Projetos/Academia"
          API_DIR="$PROJECT_DIR/apps/api"
          HEALTH_URL="http://localhost:3004/health"

          exec 9>/tmp/academia-deploy.lock
          flock -n 9 || {
            echo "Outro deploy da Academia já está em execução."
            exit 1
          }

          git config --global --add safe.directory "$PROJECT_DIR"
          cd "$PROJECT_DIR"

          if [ -n "$(git status --porcelain)" ]; then
            echo "A cópia de produção possui alterações locais. O deploy foi interrompido para evitar perda de dados."
            git status --short
            exit 1
          fi

          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          cd "$API_DIR"

          set -a
          source .env
          set +a

          # O projeto fica em uma pasta compartilhada do VMware, que não suporta symlinks.
          npm ci --no-bin-links
          npm test
          npm run check
          npm run migrate

          node --check "$PROJECT_DIR/apps/web/nav.js"
          node --check "$PROJECT_DIR/apps/web/landing.js"
          node --check "$PROJECT_DIR/apps/web/plans.js"
          node --check "$PROJECT_DIR/apps/web/alunos.js"
          node --check "$PROJECT_DIR/apps/web/planos.js"
          node --check "$PROJECT_DIR/apps/web/rich-editor.js"
          node --check "$PROJECT_DIR/apps/web/matricula-publica.js"
          node --check "$PROJECT_DIR/apps/web/payment-return.js"
          node --check "$PROJECT_DIR/apps/web/student-login.js"
          node --check "$PROJECT_DIR/apps/web/student-reset.js"
          node --check "$PROJECT_DIR/apps/web/student-confirm.js"
          python3 -m py_compile "$PROJECT_DIR/apps/web/site_server.py"

          sudo -n systemctl restart academia-api
          sudo -n systemctl restart academia-web

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$HEALTH_URL"; then
              echo
              echo "Deploy concluído com sucesso no commit $(git -C "$PROJECT_DIR" rev-parse --short HEAD)."
              echo "academia-api: $(sudo -n systemctl is-active academia-api)"
              echo "academia-web: $(sudo -n systemctl is-active academia-web)"
              exit 0
            fi
            echo "API ainda não respondeu; nova tentativa em 2 segundos ($attempt/5)."
            sleep 2
          done

          echo "A API não respondeu ao health check após o reinício."
          sudo -n systemctl status academia-api --no-pager -l || true
          exit 1
