name: Deploy Academia

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: academia-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Atualizar servidor local
    runs-on:
      - self-hosted
      - linux
      - academia
    timeout-minutes: 15

    steps:
      - name: Atualizar, validar e publicar
        shell: bash
        run: |
          set -Eeuo pipefail

          PROJECT_DIR="/mnt/Projetos/Academia"
          API_DIR="$PROJECT_DIR/apps/api"
          WEB_DIR="$PROJECT_DIR/apps/web"
          HEALTH_URL="http://localhost:3004/health"

          exec 9>/tmp/academia-deploy.lock
          flock -n 9 || {
            echo "Outro deploy da Academia já está em execução."
            exit 1
          }

          git config --global --add safe.directory "$PROJECT_DIR"
          cd "$PROJECT_DIR"

          # Arquivos temporários gerados por validações antigas não podem bloquear a atualização.
          find "$WEB_DIR" -type d -name '__pycache__' -prune -exec rm -rf {} + 2>/dev/null || true
          find "$WEB_DIR" -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete 2>/dev/null || true

          # Protege somente alterações em arquivos rastreados; .env, uploads e dependências são locais.
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "A cópia de produção possui alterações locais em arquivos rastreados. O deploy foi interrompido para evitar perda de dados."
            git status --short --untracked-files=no
            exit 1
          fi

          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          # A antiga página de permissões não pode permanecer como arquivo residual no servidor.
          rm -f "$WEB_DIR/permissions.html" "$WEB_DIR/permissions.js"

          cd "$API_DIR"

          set -a
          source .env
          set +a

          # O projeto fica em uma pasta compartilhada do VMware, que não suporta symlinks.
          npm ci --no-bin-links
          npm test
          npm run check
          npm run migrate

          node --check "$WEB_DIR/nav.js"
          node --check "$WEB_DIR/landing.js"
          node --check "$WEB_DIR/plans.js"
          node --check "$WEB_DIR/alunos.js"
          node --check "$WEB_DIR/planos.js"
          node --check "$WEB_DIR/rich-editor.js"
          node --check "$WEB_DIR/matricula-publica.js"
          node --check "$WEB_DIR/payment-return.js"
          node --check "$WEB_DIR/student-login.js"
          node --check "$WEB_DIR/student-reset.js"
          node --check "$WEB_DIR/student-confirm.js"
          python3 -m py_compile "$WEB_DIR/site_server.py"

          sudo -n systemctl restart academia-api
          sudo -n systemctl restart academia-web

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$HEALTH_URL"; then
              echo
              echo "Deploy concluído com sucesso no commit $(git -C "$PROJECT_DIR" rev-parse --short HEAD)."
              echo "academia-api: $(sudo -n systemctl is-active academia-api)"
              echo "academia-web: $(sudo -n systemctl is-active academia-web)"
              exit 0
            fi
            echo "API ainda não respondeu; nova tentativa em 2 segundos ($attempt/5)."
            sleep 2
          done

          echo "A API não respondeu ao health check após o reinício."
          sudo -n systemctl status academia-api --no-pager -l || true
          exit 1
