name: Deploy Academia

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: academia-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Atualizar servidor local
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 15

    steps:
      - name: Atualizar, validar e publicar
        shell: bash
        run: |
          set -Eeuo pipefail
          trap 'echo "Deploy interrompido na linha $LINENO."' ERR

          PROJECT_DIR="/mnt/Projetos/Academia"
          API_DIR="$PROJECT_DIR/apps/api"
          WEB_DIR="$PROJECT_DIR/apps/web"
          HEALTH_URL="http://127.0.0.1:3004/health"
          LOGIN_URL="http://127.0.0.1:3004/api/auth/login"

          exec 9>/tmp/academia-deploy.lock
          flock -n 9 || {
            echo "Outro deploy da Academia já está em execução."
            exit 1
          }

          git config --global --add safe.directory "$PROJECT_DIR"
          cd "$PROJECT_DIR"

          # A cópia da VM é uma cópia de produção: todo push na main deve prevalecer
          # sobre alterações locais em arquivos rastreados, sem apagar .env ou uploads.
          git fetch --prune origin main
          git checkout main
          git reset --hard origin/main

          # Remove apenas resíduos de páginas que já deixaram de existir no repositório.
          rm -f \
            "$WEB_DIR/permissions.html" \
            "$WEB_DIR/permissions.js" \
            "$WEB_DIR/student-accounts.html" \
            "$WEB_DIR/student-access.js"

          cd "$API_DIR"

          set -a
          # Aceita arquivos antigos que usavam "*#" como marcador de comentario.
          source <(sed 's/^\*#/#/' .env)
          set +a

          # A pasta compartilhada do VMware não suporta links simbólicos.
          npm ci --no-bin-links
          npm test
          npm run check
          npm run migrate
          npm run seed:demo

          node --check "$WEB_DIR/nav.js"
          node --check "$WEB_DIR/landing.js"
          node --check "$WEB_DIR/plans.js"
          node --check "$WEB_DIR/alunos.js"
          node --check "$WEB_DIR/planos.js"
          node --check "$WEB_DIR/rich-editor.js"
          node --check "$WEB_DIR/matricula-publica.js"
          node --check "$WEB_DIR/payment-return.js"
          node --check "$WEB_DIR/student-login.js"
          node --check "$WEB_DIR/student-reset.js"
          node --check "$WEB_DIR/student-confirm.js"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/mnt/Projetos/Academia/apps/web/site_server.py')
          compile(path.read_text(encoding='utf-8'), str(path), 'exec')
          PY

          sudo -n systemctl restart academia-api.service
          sudo -n systemctl restart academia-web.service

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$HEALTH_URL"; then
              echo
              break
            fi
            echo "API ainda não respondeu; nova tentativa em 2 segundos ($attempt/5)."
            sleep 2
          done

          curl --fail --silent --show-error "$HEALTH_URL" >/dev/null

          # Confirma que o login está alcançando a API e o banco após o deploy.
          LOGIN_STATUS="$(curl --silent --output /tmp/academia-login-probe.json --write-out '%{http_code}' \
            --header 'Content-Type: application/json' \
            --data '{"identifier":"deploy-probe@example.invalid","password":"invalid"}' \
            "$LOGIN_URL")"

          if [ "$LOGIN_STATUS" != "400" ] && [ "$LOGIN_STATUS" != "401" ]; then
            echo "A rota de login respondeu HTTP $LOGIN_STATUS."
            cat /tmp/academia-login-probe.json || true
            exit 1
          fi

          echo "Deploy concluído com sucesso no commit $(git -C "$PROJECT_DIR" rev-parse --short HEAD)."
          echo "academia-api: $(sudo -n systemctl is-active academia-api.service)"
          echo "academia-web: $(sudo -n systemctl is-active academia-web.service)"
          echo "login-api: HTTP $LOGIN_STATUS"
