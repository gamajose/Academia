name: Validar restrições e alinhamento na VM

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/validar-restricoes-alinhamento-vm.yml'

jobs:
  validar:
    runs-on: [self-hosted, linux, academia]
    timeout-minutes: 10
    env:
      PROJECT_DIR: /mnt/Projetos/Academia
      API_DIR: /mnt/Projetos/Academia/apps/api
      WEB_DIR: /mnt/Projetos/Academia/apps/web
      EXPECTED_SHA: 5815f3d90a0c98c7fbd8221025f661af83bea8cf
    steps:
      - name: Confirmar deploy automático
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global --add safe.directory "$PROJECT_DIR"
          for attempt in $(seq 1 48); do
            git -C "$PROJECT_DIR" fetch --quiet origin main
            deployed="$(git -C "$PROJECT_DIR" rev-parse HEAD)"
            remote="$(git -C "$PROJECT_DIR" rev-parse origin/main)"
            branch="$(git -C "$PROJECT_DIR" branch --show-current)"
            if [ "$branch" = "main" ] && [ "$deployed" = "$EXPECTED_SHA" ] && [ "$remote" = "$EXPECTED_SHA" ]; then
              break
            fi
            sleep 10
          done
          test "$branch" = "main"
          test "$deployed" = "$EXPECTED_SHA"
          test "$remote" = "$EXPECTED_SHA"
          test -z "$(git -C "$PROJECT_DIR" status --porcelain --untracked-files=no)"
          echo "deployed_sha=$deployed"

      - name: Validar serviços
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(systemctl is-active academia-api.service)" = "active"
          test "$(systemctl is-active academia-web.service)" = "active"
          test "$(systemctl is-active ollama.service)" = "active"
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3004/health >/dev/null
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:8084/ >/dev/null
          echo "services=active"
          echo "health=ok"

      - name: Validar correções implantadas
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'EMPTY_RESTRICTION_MARKERS' "$API_DIR/lib/trainingReviewSnapshot.js"
          grep -q 'isMeaningfulRestriction' "$API_DIR/features/trainingRules.js"
          grep -q 'EMPTY_RESTRICTION_EVIDENCE' "$WEB_DIR/training-review-ui.js"
          grep -q 'data-layout="triple"' "$WEB_DIR/training-review-premium.css"
          grep -q 'grid-auto-rows: 1fr' "$WEB_DIR/training-review-premium.css"
          node --check "$API_DIR/lib/trainingReviewSnapshot.js"
          node --check "$API_DIR/features/trainingRules.js"
          node --check "$WEB_DIR/training-review-ui.js"
          cd "$API_DIR"
          set -a
          source <(sed 's/^\*#/#/' .env)
          set +a
          node --test test/trainingReviewUi.test.js test/trainingReview.test.js
          echo "empty_restrictions=ignored"
          echo "cards=aligned"
