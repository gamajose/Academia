name: Confirmar deploy final da IA local

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ativar-ia-local-vm.yml'
  workflow_dispatch:

concurrency:
  group: confirmar-ia-local-vm
  cancel-in-progress: true

jobs:
  confirmar:
    name: Validar commit e serviços finais
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 10
    env:
      PROJECT_DIR: /mnt/Projetos/Academia
      API_DIR: /mnt/Projetos/Academia/apps/api
      EXPECTED_MAIN_SHA: bfcaf555f5f8b9795cd7443d166e57bf52f90713
      RESULT_FILE: /tmp/academia-ai-final-state.txt

    steps:
      - name: Aguardar commit final na VM
        shell: bash
        run: |
          set -Eeuo pipefail
          : > "$RESULT_FILE"
          git config --global --add safe.directory "$PROJECT_DIR"
          deployed=""
          remote=""
          for attempt in $(seq 1 36); do
            git -C "$PROJECT_DIR" fetch --quiet origin main
            deployed="$(git -C "$PROJECT_DIR" rev-parse HEAD)"
            remote="$(git -C "$PROJECT_DIR" rev-parse origin/main)"
            branch="$(git -C "$PROJECT_DIR" branch --show-current)"
            if [ "$branch" = "main" ] && [ "$deployed" = "$EXPECTED_MAIN_SHA" ] && [ "$remote" = "$EXPECTED_MAIN_SHA" ]; then
              break
            fi
            sleep 10
          done
          test "$deployed" = "$EXPECTED_MAIN_SHA"
          test "$remote" = "$EXPECTED_MAIN_SHA"
          test -z "$(git -C "$PROJECT_DIR" status --porcelain --untracked-files=no)"
          echo "deployed_sha=$deployed" | tee -a "$RESULT_FILE"
          echo "origin_main_sha=$remote" | tee -a "$RESULT_FILE"

      - name: Validar configuração e serviços
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$API_DIR"
          set -a
          source <(sed 's/^\*#/#/' .env)
          set +a
          test "$LOCAL_TRAINING_AI_ENABLED" = "true"
          test "$OLLAMA_BASE_URL" = "http://127.0.0.1:11434"
          test "$OLLAMA_MODEL" = "gemma3:1b"
          test "$OLLAMA_TIMEOUT_MS" = "240000"
          test "$OLLAMA_NUM_CTX" = "1024"
          test "$OLLAMA_NUM_PREDICT" = "160"
          test "$LOCAL_TRAINING_MAX_RETRIES" = "0"
          for service in academia-api.service academia-web.service ollama.service; do
            state="$(systemctl is-active "$service")"
            test "$state" = "active"
            echo "$service=$state" | tee -a "$RESULT_FILE"
          done
          test "$(systemctl is-enabled ollama.service)" = "enabled"
          listeners="$(ss -lntH | awk '$4 ~ /:11434$/ {print $4}')"
          printf '%s\n' "$listeners" | grep -Eq '^127\.0\.0\.1:11434$'
          ! printf '%s\n' "$listeners" | grep -Eq '(^|\[)(0\.0\.0\.0|::|\*).*:11434$'
          ollama list | awk 'NR > 1 && $1 == "gemma3:1b" {found=1} END {exit found ? 0 : 1}'
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3004/health >/dev/null
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:8084/ >/dev/null
          echo "ai_enabled=true" | tee -a "$RESULT_FILE"
          echo "ollama_model=gemma3:1b" | tee -a "$RESULT_FILE"
          echo "ollama_bind=$listeners" | tee -a "$RESULT_FILE"
          echo "api_health=ok" | tee -a "$RESULT_FILE"
          echo "web_health=ok" | tee -a "$RESULT_FILE"
          echo "memory=$(free -h | awk '/^Mem:/ {print $2 "/" $3 "/" $7}')" | tee -a "$RESULT_FILE"
          echo "swap=$(free -h | awk '/^Swap:/ {print $2 "/" $3}')" | tee -a "$RESULT_FILE"

      - name: Publicar estado seguro
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: estado-final-ia-local-${{ github.run_id }}
          path: /tmp/academia-ai-final-state.txt
          if-no-files-found: warn
          retention-days: 3
