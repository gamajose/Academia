name: Gerar APK do aplicativo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mobile-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compilar APK release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Gerar APK release
        run: flutter build apk --release --build-number "${{ github.run_number }}"

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: bluerec-apk-${{ github.sha }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
