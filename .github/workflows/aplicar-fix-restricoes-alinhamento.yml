name: Aplicar correção de restrições e alinhamento

on:
  push:
    branches:
      - fix/restricoes-vazias-e-alinhamento-ia
    paths:
      - '.github/workflows/aplicar-fix-restricoes-alinhamento.yml'
      - '.github/scripts/apply_restriction_alignment_fix.py'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restricoes-vazias-e-alinhamento-ia
          fetch-depth: 0
      - name: Aplicar correção
        run: python3 .github/scripts/apply_restriction_alignment_fix.py
      - name: Validar
        run: |
          node --check apps/api/lib/trainingReviewSnapshot.js
          node --check apps/api/features/trainingRules.js
          node --check apps/web/training-review-ui.js
          node --test apps/api/test/trainingReviewUi.test.js apps/api/test/trainingReview.test.js
      - name: Registrar alteração
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/scripts/apply_restriction_alignment_fix.py
          rm -f .github/workflows/aplicar-fix-restricoes-alinhamento.yml
          git add apps/api/lib/trainingReviewSnapshot.js apps/api/features/trainingRules.js apps/api/test/trainingReview.test.js apps/api/test/trainingReviewUi.test.js apps/web/training-review-ui.js apps/web/training-review-premium.css .github/scripts/apply_restriction_alignment_fix.py .github/workflows/aplicar-fix-restricoes-alinhamento.yml
          git commit -m 'fix(ia): ocultar restrições vazias e alinhar indicadores'
          git push origin HEAD:fix/restricoes-vazias-e-alinhamento-ia
