name: Diagnosticar IA local na VM

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/diagnostico-ia-vm.yml'
  workflow_dispatch:

concurrency:
  group: diagnostico-ia-vm
  cancel-in-progress: true

jobs:
  diagnostico:
    name: Validar deploy, Ollama e fallback
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 20
    env:
      PROJECT_DIR: /mnt/Projetos/Academia
      API_DIR: /mnt/Projetos/Academia/apps/api
      DIAG_FILE: /tmp/academia-ai-diagnostic.txt

    steps:
      - name: Preparar diagnóstico
        shell: bash
        run: |
          set -Eeuo pipefail
          : > "$DIAG_FILE"
          echo "diagnostico_inicio=$(date -Is)" | tee -a "$DIAG_FILE"

      - name: Confirmar ambiente implantado
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global --add safe.directory "$PROJECT_DIR"
          git -C "$PROJECT_DIR" fetch --quiet origin main
          BRANCH="$(git -C "$PROJECT_DIR" branch --show-current)"
          HEAD_SHA="$(git -C "$PROJECT_DIR" rev-parse HEAD)"
          MAIN_SHA="$(git -C "$PROJECT_DIR" rev-parse origin/main)"
          TRACKED_DIRTY="$(git -C "$PROJECT_DIR" status --porcelain --untracked-files=no)"
          {
            echo "branch=$BRANCH"
            echo "head=$HEAD_SHA"
            echo "origin_main=$MAIN_SHA"
            echo "tracked_tree_clean=$([ -z "$TRACKED_DIRTY" ] && echo yes || echo no)"
          } | tee -a "$DIAG_FILE"
          test "$BRANCH" = "main"
          test "$HEAD_SHA" = "$MAIN_SHA"
          test -z "$TRACKED_DIRTY"

          for service in academia-api.service academia-web.service ollama.service; do
            state="$(systemctl is-active "$service")"
            echo "$service=$state" | tee -a "$DIAG_FILE"
            test "$state" = "active"
          done
          test "$(systemctl is-enabled ollama.service)" = "enabled"

          OLLAMA_LISTENERS="$(ss -lntH | awk '$4 ~ /:11434$/ {print $4}')"
          echo "ollama_listeners=$OLLAMA_LISTENERS" | tee -a "$DIAG_FILE"
          printf '%s\n' "$OLLAMA_LISTENERS" | grep -Eq '^127\.0\.0\.1:11434$'
          ! printf '%s\n' "$OLLAMA_LISTENERS" | grep -Eq '(^|\[)(0\.0\.0\.0|::|\*).*:11434$'

          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3004/health >/dev/null
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:8084/ >/dev/null
          echo "application_health=ok" | tee -a "$DIAG_FILE"
          ollama list | awk 'NR > 1 && $1 == "gemma3:4b" {found=1} END {exit found ? 0 : 1}'
          echo "ollama_model=gemma3:4b" | tee -a "$DIAG_FILE"

      - name: Ajustar limites seguros para execução por CPU
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('/mnt/Projetos/Academia/apps/api/.env')
          text = path.read_text(encoding='utf-8')
          updates = {
              'LOCAL_TRAINING_AI_ENABLED': 'true',
              'OLLAMA_BASE_URL': 'http://127.0.0.1:11434',
              'OLLAMA_MODEL': 'gemma3:4b',
              'OLLAMA_TIMEOUT_MS': '300000',
              'LOCAL_TRAINING_MAX_RETRIES': '0',
              'OLLAMA_TEMPERATURE': '0',
              'OLLAMA_KEEP_ALIVE': '0',
              'OLLAMA_NUM_CTX': '2048',
              'OLLAMA_NUM_PARALLEL': '1',
              'LOCAL_TRAINING_PROMPT_VERSION': 'v1',
          }
          lines = text.splitlines()
          found = set()
          output = []
          for line in lines:
              stripped = line.strip()
              replaced = False
              for key, value in updates.items():
                  if stripped.startswith(f'{key}='):
                      output.append(f'{key}={value}')
                      found.add(key)
                      replaced = True
                      break
              if not replaced:
                  output.append(line)
          if output and output[-1] != '':
              output.append('')
          for key, value in updates.items():
              if key not in found:
                  output.append(f'{key}={value}')
          path.write_text('\n'.join(output).rstrip() + '\n', encoding='utf-8')
          PY

          sudo -n systemctl restart academia-api.service
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3004/health >/dev/null; then
              break
            fi
            sleep 2
          done
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3004/health >/dev/null

          cd "$API_DIR"
          set -a
          source <(sed 's/^\*#/#/' .env)
          set +a
          for key in LOCAL_TRAINING_AI_ENABLED OLLAMA_BASE_URL OLLAMA_MODEL OLLAMA_TIMEOUT_MS LOCAL_TRAINING_MAX_RETRIES OLLAMA_TEMPERATURE OLLAMA_KEEP_ALIVE OLLAMA_NUM_CTX OLLAMA_NUM_PARALLEL LOCAL_TRAINING_PROMPT_VERSION; do
            value="${!key-}"
            test -n "$value"
            echo "$key=$value" | tee -a "$DIAG_FILE"
          done
          test "$OLLAMA_TIMEOUT_MS" = "300000"
          test "$LOCAL_TRAINING_MAX_RETRIES" = "0"

      - name: Validar migration, seed e testes
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$API_DIR"
          set -a
          source <(sed 's/^\*#/#/' .env)
          set +a

          node <<'NODE' | tee -a "$DIAG_FILE"
          const { query, pool } = require('./lib/db');
          (async () => {
            const columns = await query(`
              SELECT column_name
              FROM information_schema.columns
              WHERE table_schema = 'public' AND table_name = 'workout_ai_reviews'
            `);
            const found = new Set(columns.rows.map((row) => row.column_name));
            const required = [
              'source', 'model', 'prompt_version', 'status', 'confidence',
              'requires_human_review', 'signals', 'student_message', 'trainer_notes',
              'input_snapshot_hash', 'approved_at', 'approved_by', 'rejected_at',
              'rejected_by', 'rejection_reason', 'error_code', 'duration_ms', 'token_usage'
            ];
            for (const name of required) if (!found.has(name)) throw new Error(`coluna_ausente:${name}`);
            const lockTable = await query(`SELECT to_regclass('public.training_ai_generation_locks') AS name`);
            if (!lockTable.rows[0]?.name) throw new Error('tabela_lock_ausente');
            console.log(JSON.stringify({ migration_058: 'ok', columns: required.length, lock_table: 'ok' }));
          })().finally(() => pool.end());
          NODE

          SEED_OUTPUT="$(npm run seed:demo 2>&1)"
          printf '%s' "$SEED_OUTPUT" | grep -q 'seed_demo_ok'
          if printf '%s' "$SEED_OUTPUT" | grep -Eiq 'Lobo1234|demo\.[^ ]+@|senha|password|secret_hash'; then
            echo "seed_output=sensitive_pattern_detected" | tee -a "$DIAG_FILE"
            exit 1
          fi
          echo "seed_output=sanitized" | tee -a "$DIAG_FILE"

          NODE_ENV=test AUTH_SECRET=test-secret-with-more-than-thirty-two-characters \
            node --test test/trainingReview.test.js
          echo "training_review_tests=ok" | tee -a "$DIAG_FILE"

      - name: Validar geração real, aprovação e fallback
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$API_DIR"
          set -a
          source <(sed 's/^\*#/#/' .env)
          set +a

          LOCAL_TRAINING_PLAN_COOLDOWN_SECONDS=0 LOCAL_TRAINING_RATE_LIMIT_PER_HOUR=100 node <<'NODE' | tee -a "$DIAG_FILE"
          const { query, pool } = require('./lib/db');
          const { reviewTrainingPlan, decideTrainingReview, latestApprovedStudentMessage } = require('./services/trainingReviewService');

          (async () => {
            const created = [];
            let plan;
            try {
              const planResult = await query(`
                SELECT wp.id, wp.gym_id, wp.member_id, wp.reviewed_at
                FROM workout_plans wp
                WHERE wp.name = 'Ficha Demo - Força' AND wp.status = 'active'
                ORDER BY wp.created_at
                LIMIT 1
              `);
              if (!planResult.rowCount) throw new Error('ficha_demo_ausente');
              plan = planResult.rows[0];

              const actorResult = await query(`
                SELECT id, gym_id, role, access_profile
                FROM users
                WHERE gym_id = $1 AND is_active = true AND role IN ('owner', 'admin')
                ORDER BY created_at
                LIMIT 1
              `, [plan.gym_id]);
              if (!actorResult.rowCount) throw new Error('gestor_ausente');
              const row = actorResult.rows[0];
              const actor = { sub: row.id, gym_id: row.gym_id, role: row.role, access_profile: row.access_profile, access_permissions: { training: true } };

              const generative = await reviewTrainingPlan({ query, user: actor, planId: plan.id });
              created.push(generative.id);
              if (generative.source !== 'local_generative') throw new Error(`geracao_local_falhou:${generative.error_code || generative.source}`);

              const approved = await decideTrainingReview(query, actor, generative.id, 'approved');
              if (!approved.approved_at) throw new Error('aprovacao_falhou');
              const studentView = await latestApprovedStudentMessage(query, { role: 'student', gym_id: plan.gym_id, member_id: plan.member_id });
              if (studentView?.id !== generative.id) throw new Error('mensagem_aprovada_nao_visivel');
              const rejected = await decideTrainingReview(query, actor, generative.id, 'rejected', 'Validação automatizada temporária');
              if (!rejected.rejected_at || rejected.approved_at) throw new Error('rejeicao_falhou');

              const previousEnabled = process.env.LOCAL_TRAINING_AI_ENABLED;
              process.env.LOCAL_TRAINING_AI_ENABLED = 'false';
              const fallback = await reviewTrainingPlan({ query, user: actor, planId: plan.id });
              process.env.LOCAL_TRAINING_AI_ENABLED = previousEnabled;
              created.push(fallback.id);
              if (fallback.source !== 'rules_fallback') throw new Error('fallback_nao_acionado');

              console.log(JSON.stringify({
                generative_source: generative.source,
                generative_model: generative.model,
                generative_duration_ms: generative.duration_ms,
                approval: 'ok',
                rejection: 'ok',
                student_visibility: 'ok',
                fallback_source: fallback.source,
                fallback_error_code: fallback.error_code
              }));
            } finally {
              if (created.length) await query('DELETE FROM workout_ai_reviews WHERE id = ANY($1::uuid[])', [created]);
              if (plan) await query('UPDATE workout_plans SET reviewed_at = $2 WHERE id = $1', [plan.id, plan.reviewed_at]);
              await query("DELETE FROM training_ai_generation_locks WHERE lock_key = 'global'");
              await pool.end();
            }
          })();
          NODE

      - name: Registrar recursos finais
        if: always()
        shell: bash
        run: |
          {
            echo "memory=$(free -h | awk '/^Mem:/ {print $2 "/" $3 "/" $7}')"
            echo "swap=$(free -h | awk '/^Swap:/ {print $2 "/" $3}')"
            echo "ollama_loaded=$(ollama ps 2>/dev/null | awk 'NR > 1 {print $1}' | paste -sd, -)"
            echo "diagnostico_fim=$(date -Is)"
          } | tee -a "$DIAG_FILE"

      - name: Publicar diagnóstico seguro
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-ia-vm-${{ github.run_id }}
          path: /tmp/academia-ai-diagnostic.txt
          if-no-files-found: warn
          retention-days: 3
