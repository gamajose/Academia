name: Validar retorno da análise na VM

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/validar-retorno-analise-vm.yml'

jobs:
  validar:
    runs-on: [self-hosted, linux, academia]
    timeout-minutes: 8
    env:
      PROJECT_DIR: /mnt/Projetos/Academia
      API_DIR: /mnt/Projetos/Academia/apps/api
      WEB_DIR: /mnt/Projetos/Academia/apps/web
      EXPECTED_SHA: c3843660d8f62179b0f87bbe956018e2cda1f07e
    steps:
      - name: Confirmar deploy automático
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global --add safe.directory "$PROJECT_DIR"
          deployed=""
          remote=""
          branch=""
          for attempt in $(seq 1 36); do
            git -C "$PROJECT_DIR" fetch --quiet origin main
            deployed="$(git -C "$PROJECT_DIR" rev-parse HEAD)"
            remote="$(git -C "$PROJECT_DIR" rev-parse origin/main)"
            branch="$(git -C "$PROJECT_DIR" branch --show-current)"
            if [ "$branch" = "main" ] && [ "$deployed" = "$EXPECTED_SHA" ] && [ "$remote" = "$EXPECTED_SHA" ]; then
              break
            fi
            sleep 10
          done
          test "$branch" = "main"
          test "$deployed" = "$EXPECTED_SHA"
          test "$remote" = "$EXPECTED_SHA"
          test -z "$(git -C "$PROJECT_DIR" status --porcelain --untracked-files=no)"
          echo "deployed_sha=$deployed"

      - name: Validar serviços e saúde
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(systemctl is-active academia-api.service)" = "active"
          test "$(systemctl is-active academia-web.service)" = "active"
          test "$(systemctl is-active ollama.service)" = "active"
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3004/health >/dev/null
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:8084/ >/dev/null
          echo "services=active"
          echo "health=ok"

      - name: Validar correção implantada
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'training.js?v=20260719-4' "$WEB_DIR/training.html"
          grep -q 'training-review-ui.js?v=20260719-2' "$WEB_DIR/training.html"
          grep -q 'recoverRecentReview' "$WEB_DIR/training-review-ui.js"
          grep -q 'Dados insuficientes para medir a confiabilidade' "$WEB_DIR/training-review-ui.js"
          grep -q 'Manter a ficha até a revisão do professor' "$WEB_DIR/training-review-ui.js"
          ! grep -q "review-plan-button').addEventListener" "$WEB_DIR/training.js"
          ! grep -q "review-history-button').addEventListener" "$WEB_DIR/training.js"
          node --check "$WEB_DIR/training-review-ui.js"
          node --check "$WEB_DIR/training.js"
          cd "$API_DIR"
          set -a
          source <(sed 's/^\*#/#/' .env)
          set +a
          node --test test/trainingReviewUi.test.js
          echo "single_handler=ok"
          echo "automatic_recovery=ok"
          echo "readable_confidence=ok"
