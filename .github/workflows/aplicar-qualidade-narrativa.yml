name: Aplicar qualidade da narrativa

on:
  push:
    branches:
      - fix/analise-ia-interface-clara
    paths:
      - '.github/workflows/aplicar-qualidade-narrativa.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/analise-ia-interface-clara
          fetch-depth: 0

      - name: Proteger resumo da IA local
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/api/services/localTrainingAiService.js')
          text = path.read_text(encoding='utf-8')

          original_prompt = "    'Responda somente no JSON definido pelo schema, com três textos curtos em português do Brasil.',"
          improved_prompt = "    'Responda somente no JSON definido pelo schema, com três textos curtos em português do Brasil e sempre em frases completas, sem códigos internos ou palavras abreviadas.',"
          if original_prompt in text:
              text = text.replace(original_prompt, improved_prompt, 1)

          marker = "function mergeNarrativeWithRules(narrative, rules) {\n  return {\n    summary: narrative.summary,"
          replacement = """function completeNarrativeSummary(value, fallback) {
  const text = String(value || '').trim();
  const normalized = text.normalize('NFD').replace(/[\\u0300-\\u036f]/g, '');
  const truncatedEnding = /\\b(rep|reps|serie|series|sessao|sessoes|treino|exercicio|exercicios)$/i.test(normalized);
  if (text.length < 20 || truncatedEnding || !/[.!?]$/.test(text)) return fallback;
  return text;
}

function mergeNarrativeWithRules(narrative, rules) {
  return {
    summary: completeNarrativeSummary(narrative.summary, rules.summary),"""
          if marker not in text:
              raise SystemExit('merge_alvo_nao_encontrado')
          text = text.replace(marker, replacement, 1)
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/aplicar-qualidade-narrativa.yml').unlink()
          PY

      - name: Registrar alteração
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/services/localTrainingAiService.js .github/workflows/aplicar-qualidade-narrativa.yml
          git commit -m 'fix(api): rejeitar resumo narrativo incompleto'
          git push origin HEAD:fix/analise-ia-interface-clara
