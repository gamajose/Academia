name: Aplicar correção da interface de IA

on:
  push:
    branches:
      - fix/analise-ia-interface-clara
    paths:
      - '.github/workflows/aplicar-fix-interface-ia.yml'

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/analise-ia-interface-clara
          fetch-depth: 0

      - name: Atualizar página de treinos
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/web/training.html')
          text = path.read_text(encoding='utf-8')
          old = '<script src="./training.js?v=20260716-5"></script>'
          new = '<script src="./training.js?v=20260719-3"></script>\n<script src="./training-review-ui.js?v=20260719-1"></script>'
          if old not in text:
              raise SystemExit('referencia_training_js_nao_encontrada')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/aplicar-fix-interface-ia.yml').unlink()
          PY

      - name: Registrar alteração na branch
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/training.html .github/workflows/aplicar-fix-interface-ia.yml
          git commit -m 'fix(web): carregar interface clara da análise de IA'
          git push origin HEAD:fix/analise-ia-interface-clara
