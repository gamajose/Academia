name: Aplicar correção do histórico de IA

on:
  push:
    branches:
      - fix/historico-ia-treinos-no-perfil
    paths:
      - '.github/scripts/apply_training_history_profile_fix.py'
      - '.github/workflows/aplicar-fix-historico-ia-treinos.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/scripts/apply_training_history_profile_fix.py'
      - '.github/workflows/aplicar-fix-historico-ia-treinos.yml'

permissions:
  contents: write

jobs:
  aplicar:
    if: github.head_ref == '' || github.head_ref == 'fix/historico-ia-treinos-no-perfil'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Baixar branch silenciosamente
        env:
          GH_TOKEN: ${{ github.token }}
        run: git clone --quiet --depth 1 --branch fix/historico-ia-treinos-no-perfil "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" source
      - name: Aplicar correção
        run: |
          cd source
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply_training_history_profile_fix.py')
          text = path.read_text(encoding='utf-8')
          old = '    new_history_block + "async function loadStudentAi(memberId",\n'
          new = '    lambda _: new_history_block + "async function loadStudentAi(memberId",\n'
          if old not in text:
              raise SystemExit('substituicao_regex_nao_encontrada')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          set +e
          python3 -u .github/scripts/apply_training_history_profile_fix.py > .github/fix-historico-diagnostico.txt 2>&1
          status=$?
          cat .github/fix-historico-diagnostico.txt
          if [ "$status" -ne 0 ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .github/fix-historico-diagnostico.txt
            git commit -m 'chore: atualizar diagnóstico do aplicador' || true
            git push origin HEAD:fix/historico-ia-treinos-no-perfil
            exit "$status"
          fi
          rm -f .github/fix-historico-diagnostico.txt
      - name: Validar alterações
        run: |
          cd source
          node --check apps/web/alunos.js
          node --check apps/api/features/assessmentRoutes.js
          node --check apps/api/features/trainingPlansRoutes.js
          node --check apps/api/services/trainingReviewService.js
          node --test apps/api/test/studentAiProfileHistoryUi.test.js
      - name: Registrar correção
        run: |
          cd source
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/scripts/apply_training_history_profile_fix.py
          rm -f .github/workflows/aplicar-fix-historico-ia-treinos.yml
          rm -f .github/fix-historico-diagnostico.txt
          git add apps/api/features/assessmentRoutes.js apps/api/features/trainingPlansRoutes.js apps/api/services/trainingReviewService.js apps/web/alunos.html apps/web/alunos.js apps/web/product-layout.css apps/api/test/studentAiProfileHistoryUi.test.js .github/scripts/apply_training_history_profile_fix.py .github/workflows/aplicar-fix-historico-ia-treinos.yml .github/fix-historico-diagnostico.txt
          git commit -m 'fix: usar histórico real da IA de treinos no perfil'
          git push origin HEAD:fix/historico-ia-treinos-no-perfil
