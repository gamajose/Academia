name: Validar projeto

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/mobile/**'
      - 'database/**'
      - '.github/workflows/ci-api.yml'
  push:
    branches:
      - 'agent/**'
    paths:
      - 'apps/api/**'
      - 'apps/mobile/**'
      - 'database/**'
      - '.github/workflows/ci-api.yml'

jobs:
  api:
    name: Testes e sintaxe da API
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar sintaxe e regras
        shell: bash
        env:
          NODE_ENV: test
          AUTH_SECRET: test-secret-with-more-than-thirty-two-characters
        run: |
          set +e
          npm run check 2>&1 | tee api-check.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Publicar diagnostico da API
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-check-${{ github.run_id }}
          path: apps/api/api-check.log
          if-no-files-found: ignore
          retention-days: 7

  mobile:
    name: Analisar aplicativo Flutter
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Analisar codigo Flutter
        shell: bash
        run: |
          set +e
          flutter analyze 2>&1 | tee flutter-analyze.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Publicar diagnostico Flutter
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-${{ github.run_id }}
          path: apps/mobile/flutter-analyze.log
          if-no-files-found: ignore
          retention-days: 7
