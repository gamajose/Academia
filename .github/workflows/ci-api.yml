name: Validar projeto

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/mobile/**'
      - 'apps/web/**'
      - 'database/**'
      - '.github/workflows/ci-api.yml'
      - '.github/workflows/deploy-main.yml'

  push:
    branches:
      - 'agent/**'
      - 'codex/**'
    paths:
      - 'apps/api/**'
      - 'apps/mobile/**'
      - 'apps/web/**'
      - 'database/**'
      - '.github/workflows/ci-api.yml'
      - '.github/workflows/deploy-main.yml'

concurrency:
  group: validar-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Testes e sintaxe da API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Validar sintaxe e regras
        shell: bash
        env:
          NODE_ENV: test
          AUTH_SECRET: test-secret-with-more-than-thirty-two-characters
        run: |
          set +e
          npm run check 2>&1 | tee api-check.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Publicar diagnostico da API
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-check-${{ github.run_id }}
          path: apps/api/api-check.log
          if-no-files-found: ignore
          retention-days: 7

  web:
    name: Validar interface web
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validar JavaScript da interface
        shell: bash
        run: |
          set -e
          node --check apps/web/nav.js
          node --check apps/web/landing.js
          node --check apps/web/plans.js
          node --check apps/web/alunos.js
          node --check apps/web/planos.js
          node --check apps/web/rich-editor.js
          node --check apps/web/student-login.js
          node --check apps/web/matricula-publica.js
          node --check apps/web/student-reset.js
          node --check apps/web/student-confirm.js
          node --check apps/web/student-portal.js
          node --check apps/web/assessments.js
          node --check apps/web/training.js
          node --check apps/web/training-media.js
          node --check apps/web/account.js
          node --check apps/web/security.js
          node --check apps/web/users.js
          node --check apps/web/dashboard-session-stability.js
          node --check apps/web/dashboard-auto-refresh.js
          python -m py_compile apps/web/site_server.py
      - name: Proteger decisões de experiência
        shell: bash
        run: |
          set -e
          ! grep -qi "QR acesso liberado" apps/web/index.html
          ! grep -qi "Equipe gestão completa" apps/web/index.html
          ! grep -q "\['index.html', 'Site'\]" apps/web/nav.js
          ! grep -q 'id="refresh-button"' apps/web/painel.html
          ! grep -q 'id="logout-button"' apps/web/painel.html
          ! grep -q 'student-refresh-button' apps/web/student-portal.html
          ! grep -q 'student-logout-button' apps/web/student-portal.html
          grep -q 'open-assessment-modal' apps/web/assessments.html
          grep -q 'dashboard-session-stability.js' apps/web/painel.html
          grep -q '.modal-close' apps/web/premium-ui.css
          grep -q 'student-cpf' apps/web/alunos.html
          grep -q 'plan-price-page' apps/web/planos.html
          grep -q 'id="manage-permissions-button"' apps/web/users.html
          grep -q 'id="permissions-manager-modal"' apps/web/users.html
          grep -q 'NAV_BUILD_VERSION' apps/web/nav.js
          grep -q 'data-page=' apps/web/nav.js
          grep -q "'permissions.html':" apps/web/site_server.py
          grep -q "'student-accounts.html':" apps/web/site_server.py
          grep -q 'NAV_SCRIPT_PATTERN' apps/web/site_server.py
          ! grep -q "\['permissions.html', 'Permissões'\]" apps/web/nav.js
          ! grep -q "\['student-accounts.html', 'Acesso'\]" apps/web/nav.js
          test ! -e apps/web/permissions.html
          test ! -e apps/web/permissions.js
          test ! -e apps/web/student-accounts.html
          test ! -e apps/web/student-access.js
          grep -q '/api/student/access/credential' apps/mobile/lib/student_home_page.dart
          grep -q 'access_code' apps/mobile/lib/student_home_page.dart
          grep -q 'access_code' apps/api/features/accessRoutes.js
          grep -q 'code_hash' database/035_dynamic_student_access_code.sql
          ! grep -Rqi "Valor em centavos\|Destaque público\|CPF/RG" apps/web --include='*.html' --include='*.js'

  mobile:
    name: Analisar aplicativo Flutter
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Instalar dependencias
        run: flutter pub get
      - name: Analisar codigo Flutter
        shell: bash
        run: |
          set +e
          flutter analyze 2>&1 | tee flutter-analyze.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Publicar diagnostico Flutter
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-${{ github.run_id }}
          path: apps/mobile/flutter-analyze.log
          if-no-files-found: ignore
          retention-days: 7
